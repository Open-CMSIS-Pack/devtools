# yaml-language-server: $schema=https://raw.githubusercontent.com/Open-CMSIS-Pack/devtools/schemas/projmgr/0.9.0/tools/projmgr/schemas/cproject.schema.json

project:
  optimize: size
  debug: off
  warnings: no
  components:
    - component: Startup
    - component: CORE
      debug: on
      optimize: debug
  groups:
    - group: Generated Code
      optimize: max
      files:
        - file: file1.c
          optimize: speed
        - file: file2.c
          warnings: all
        - file: file3.c
