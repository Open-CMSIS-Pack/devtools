generator:
  - id: CubeMX
    description: Global Registered Generator
    download-url: https://www.st.com/en/development-tools/stm32cubemx.html#st-get-software
    run: ../bin/cbridge
    path: $SolutionDir()$/STM32CubeMX/$TargetType$
  - id: MCUXpressoConfig
    description: Global Registered Generator MCUXpresso Config tools
    download-url: https://www.nxp.com/configtools
    run: ../bin/launch-MCUXpressoConfigTools
    path: $SolutionDir()$/MCUXpressoConfig/$TargetType$
  - id: InfineonDeviceConfigurator
    description: Global Registered Generator for Infineon Device Configuration tool
    download-url: https://softwaretools.infineon.com/tools/com.ifx.tb.tool.deviceconfigurator
    run: ../bin/launch-Infineon_Dev_Config
    path: $ProjectDir()$/RTE/Device_Configurator/$TargetType$
  - id: Infineon_Device_Configurator
    description: Global Registered Generator for Infineon Device Configurator (MOTIX and LITIX devices)
    download-url: https://softwaretools.infineon.com/tools/com.ifx.tb.tool.deviceconfigurator
    run: ../bin/launch-Infineon_Dev_Config_motixlitix.bat
    path: $SolutionDir()$/config
  - id: InfineonMcuConfigWizard
    description: Global Registered Generator for Infineon MCU Config Wizard (MOTIX and LITIX devices)
    download-url: https://softwaretools.infineon.com/assets/com.ifx.tb.tool.ifxconfigwizardforembeddedpowerics
    run: ../bin/launch-Infineon_MCU_Config_Wizard.bat
    path: $SolutionDir()$/InfineonMcuConfigWizard/$TargetType$
